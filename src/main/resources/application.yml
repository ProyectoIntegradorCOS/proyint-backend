spring:
  application:
    name: location-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://thaqhiri-dev-db.c5yeysa8c27n.us-west-2.rds.amazonaws.com:5432/thaqhiri}
    username: ${SPRING_DATASOURCE_USERNAME:admindmcfinal}
    password: ${SPRING_DATASOURCE_PASSWORD:AdminDMC123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      pool-name: HikariPostgreSQLPool
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:5511}

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF

  file:
    name: ${LOG_FILE:}

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

# Clave secreta para firmar JWT (HS256, 32 bytes en Base64).
# Generar con: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:7RVrNuK8V7Z9f2L1hJ3mP4nQ5oR6sT0wX1yA2bC3dE0=}
  expiration: ${JWT_EXPIRATION:PT8H}

mapbox:
  access-token: ${MAPBOX_ACCESS_TOKEN:}
  geocode-api: ${MAPBOX_GEOCODE_API:v6}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
