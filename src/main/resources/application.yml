spring:
  application:
    name: location-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/thaqhiri}
    username: ${SPRING_DATASOURCE_USERNAME:thaqhiri}
    password: ${SPRING_DATASOURCE_PASSWORD:thaqhiri}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      pool-name: HikariPostgreSQLPool
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:5511}

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF

  # [CHANGE][autor: cormenos@onp.gob.pe][fecha: 2026-02-09 12:38 UTC-5 (Lima)][desc: Envía logs a stdout en contenedores; archivo opcional por LOG_FILE][obj: application.yml:logging.file.name]
  file:
    name: ${LOG_FILE:}

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

saa:
  # [CHANGE][autor: cormenos@onp.gob.pe][fecha: 2025-12-18 00:00 UTC-5 (Lima)][desc: Agrega propiedad para búsqueda de usuario en SAA consumida por /api/users/buscarUsuarioSaa][obj: application.yml:saa.buscar-usuario-url]
  buscar-usuario-url: ${SAA_BUSCAR_USUARIO_URL:http://10.50.129.101:9080/appPuenteRestSaaWeb/PuenteRestSaa/consulta/usuarioperfil}
  generate-url: ${SAA_GENERATE_URL:http://10.50.129.101:9080/appComponenteWeb/SAA/token/semilla/generar}
  # [CHANGE][autor: cormenos@onp.gob.pe][fecha: 2026-02-09 11:10 UTC-5 (Lima)][desc: URL SAA para generar token por usuario/clave (login móvil)][obj: application.yml:saa.usuario-generate-url]
  usuario-generate-url: ${SAA_USUARIO_GENERATE_URL:http://10.50.129.101:9080/appComponenteWeb/SAA/token/usuario/generar}
  # [CHANGE][autor: codex][fecha: 2026-04-30 UTC-5 (Lima)][desc: URL SAA para renovar token vía backend móvil/web][obj: application.yml:saa.renew-url]
  renew-url: ${SAA_RENEW_URL:http://10.50.129.101:9080/appComponenteWeb/SAA/token/renovar}
  validate-url: ${SAA_VALIDATE_URL:http://10.50.129.101:9080/appComponenteWeb/SAA/token/validar}
  # [CHANGE][autor: cormenos@onp.gob.pe][fecha: 2025-12-18 00:00 UTC-5 (Lima)][desc: Corrige env var de cierre de sesión SAA (era SAA_VALIDATE_URL)][obj: application.yml:saa.close-url]
  close-url: ${SAA_CLOSE_URL:http://10.50.129.101:9080/appComponenteWeb/SAA/token/cerrarSesion}
  perfil-sistema-url: ${SAA_PERFILSISTEMA_URL:http://10.50.129.101:9080/appPuenteRestSaaWeb/PuenteRestSaa/consulta/perfilsistema}
  usuario-perfil-vigente-url: ${SAA_USUARIOPERFILVIGENTE_URL:http://10.50.129.101:9080/appPuenteRestSaaWeb/PuenteRestSaa/consulta/usuarioperfilvigente}
  perfil-campo: ${SAA_PERFILCAMPO_URL:COLABORADOR_DE_CAMPO}
  # [CHANGE][autor: cormenos@onp.gob.pe][fecha: 2025-12-18 00:00 UTC-5 (Lima)][desc: Mantiene validación remota obligatoria; solo habilitar en entornos controlados][obj: application.yml:saa.allow-unsafe-jwt-decode]
  allow-unsafe-jwt-decode: ${SAA_ALLOW_UNSAFE_JWT_DECODE:false}
  system-code-thaqhiri: ${SAA_SYSTEM_CODE_THAQHIRI:641}
  timeout: ${SAA_TIMEOUT:PT5S}
  cache:
    min-ttl: ${SAA_CACHE_MIN_TTL:PT1M}
    fallback-ttl: ${SAA_CACHE_FALLBACK_TTL:PT5M}

mapbox:
  access-token: ${MAPBOX_ACCESS_TOKEN:pk.eyJ1IjoiY29ybWVub3MiLCJhIjoiY21oMHowMjJsMmpvYzJqcTJ0dDVuYWw5ZyJ9.IXwCQMQVg9zymZNGIyAKNQ}
  # v6 = Mapbox Search Geocoding API, v5 = Geocoding API clásico (fallback si v6 no retorna resultados)
  geocode-api: ${MAPBOX_GEOCODE_API:v6}

# // [CHANGE][autor: cormenos@onp.gob.pe][fecha: 2026-01-23 11:18 UTC-5 (Lima)][desc: Habilita endpoints Actuator para Prometheus][obj: application.yml management]
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

tarea:
  automatica:
    delay: ${TAREA_AUTO_SAA_DELAY:1h}
